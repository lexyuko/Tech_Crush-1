services:
  mongo:
    image: mongodb/mongodb-community-server
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: monclero/techcrush-backend:v2
    # build:
    #   context: ./backend     # Path to your local frontend directory
    #   dockerfile: Dockerfile   # Optional, defaults to 'Dockerfile' in that folder
    # container_name: backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/techcrush
      - JWT_SECRET=group1-techcrush.
    depends_on:
      - mongo
   

  frontend:
    image: monclero/techcrush-frontend:v2
    # build:
    #   context: ./frontend      # Path to your local frontend directory
    #   dockerfile: Dockerfile   # Optional, defaults to 'Dockerfile' in that folder
    # container_name: frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongo-data: